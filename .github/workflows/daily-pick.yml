name: Daily A-share pick

on:
  schedule:
    # 16:45 Asia/Shanghai = 08:45 UTC, Monday-Friday.
    - cron: '45 8 * * 1-5'
  workflow_dispatch:
    inputs:
      pick_date:
        description: 'Override pick date YYYY-MM-DD'
        required: false
      force:
        description: 'Run even if not CN trade day'
        required: false
        default: 'false'
      deploy_only:
        description: 'Deploy existing public files without fetching/scoring'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  pick:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run daily picker
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          RESEND_FROM_NAME: ${{ secrets.RESEND_FROM_NAME }}
          PICK_NOTIFY_EMAIL: ${{ secrets.PICK_NOTIFY_EMAIL }}
          SITE_URL: ${{ secrets.SITE_URL || 'https://a.292828.xyz' }}
          PICK_DATE: ${{ github.event.inputs.pick_date }}
        run: |
          if [ "${{ github.event.inputs.deploy_only }}" = "true" ]; then
            echo "Deploy-only mode: skip AkShare fetch, scoring, and email."
            exit 0
          fi
          FORCE=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then FORCE="--force"; fi
          python scripts/daily_pick.py --fetch-akshare --send-email $FORCE

      - name: Validate generated site data
        run: |
          python -m json.tool public/latest.json >/dev/null
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path("public/latest.json").read_text(encoding="utf-8"))
          assert payload.get("date"), "missing date"
          assert len(payload.get("strategies", [])) >= 4, "expected four strategies"
          assert payload["strategies"][0]["items"], "primary strategy has no candidates"
          assert any(s.get("id") == "v12_close_only" and s.get("items") for s in payload["strategies"]), "V1.2 close-only strategy has no candidates"
          first = payload["strategies"][0]["items"][0]
          assert first.get("price_type") == "raw_unadjusted", "display price must be raw/unadjusted market price"
          PY

      - name: Commit data and result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ public/
          git commit -m "daily pick $(date -u +%F)" || echo "No changes to commit"
          git push

  deploy:
    runs-on: ubuntu-latest
    needs: pick
    if: always() && (needs.pick.result == 'success')
    steps:
      - name: Checkout updated repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3.114.17'
          command: pages deploy public --project-name=ashare-daily-picker --commit-dirty=true
